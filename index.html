<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ScreenGuard – Dashboard</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root,[data-theme="dark"]{
  --bg:#0b0f1e;
  --card:#131929;
  --text:#e8eaf6;
  --muted:#8892b0;
  --indigo:#5c6ef8;
  --teal:#00d4b4;
  --coral:#ff6b6b;
}

[data-theme="light"]{
  --bg:#f5f7ff;
  --card:#ffffff;
  --text:#111;
  --muted:#555;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* Sidebar */
.sidebar{
  width:230px;
  background:var(--card);
  padding:20px;
  height:100vh;
  position:fixed;
}

.nav-item{
  display:block;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  text-decoration:none;
  color:var(--muted);
}
.nav-item:hover{background:#ffffff10;color:var(--text);}
.nav-item.active{background:#5c6ef830;color:var(--indigo);}

/* Main */
.main{
  margin-left:230px;
  padding:25px;
  width:100%;
}

/* Cards */
.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.stat{
  background:var(--card);
  padding:20px;
  border-radius:12px;
}

.chart{
  height:250px;
}

/* Button */
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:var(--indigo);
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>⏱ ScreenGuard</h2>
  <a class="nav-item active">Dashboard</a>
  <a class="nav-item">Apps</a>
  <a class="nav-item">Limits</a>
  <a class="nav-item">Stats</a>
  <br>
  <button onclick="toggleTheme()">Toggle Theme</button>
</div>

<!-- Main -->
<div class="main">

<h1>Dashboard</h1>
<p id="time"></p>

<!-- Stats -->
<div class="stats">
  <div class="stat">
    <h3>Total Time</h3>
    <p id="total">6h 30m</p>
  </div>

  <div class="stat">
    <h3>Apps</h3>
    <p>12</p>
  </div>

  <div class="stat">
    <h3>Limits Hit</h3>
    <p>3</p>
  </div>

  <div class="stat">
    <h3>Focus Score</h3>
    <p>70%</p>
  </div>
</div>

<!-- Chart -->
<div class="card">
  <h3>Usage</h3>
  <canvas id="chart" class="chart"></canvas>
</div>

<!-- Apps -->
<div class="card">
  <h3>Top Apps</h3>
  <div id="apps"></div>
</div>

</div>

<script>

/* CLOCK */
setInterval(()=>{
  document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
},1000);

/* THEME */
function toggleTheme(){
  const html=document.documentElement;
  html.dataset.theme =
    html.dataset.theme==="dark" ? "light":"dark";
}

/* APP DATA */
const apps=[
 {name:"Instagram",time:150},
 {name:"YouTube",time:90},
 {name:"Chrome",time:60}
];

/* RENDER APPS */
const appDiv=document.getElementById("apps");
apps.forEach(a=>{
  appDiv.innerHTML+=
   `<p>${a.name} - ${Math.floor(a.time/60)}h ${a.time%60}m</p>`;
});

/* CHART */
new Chart(document.getElementById("chart"),{
 type:"bar",
 data:{
  labels:["6AM","9AM","12PM","3PM","6PM","9PM"],
  datasets:[{
    label:"Minutes",
    data:[20,40,60,50,80,30]
  }]
 }
});

</script>

</body>
</html>
